decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10

    active_opacity = 0.9
    inactive_opacity = 0.8
    blur {
        enabled = true
        size = 7
        passes = 2
        new_optimizations = true
    }

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 10
    col.shadow = $crust
}
